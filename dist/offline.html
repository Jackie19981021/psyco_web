<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 - PSYCO</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        .offline-icon svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .features {
            margin: 40px 0;
            padding: 0;
            list-style: none;
        }

        .features li {
            margin: 15px 0;
            font-size: 1.1em;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .features li::before {
            content: "✓";
            margin-right: 10px;
            font-weight: bold;
            color: #4CAF50;
        }

        .retry-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            margin: 20px 10px;
        }

        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .network-status {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            font-size: 0.9em;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            background: #ff4444;
            animation: blink 1.5s ease-in-out infinite alternate;
        }

        .status-indicator.online {
            background: #4CAF50;
            animation: none;
        }

        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .tips {
            margin-top: 30px;
            text-align: left;
            background: rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .tips h3 {
            margin-bottom: 15px;
            text-align: center;
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
            font-size: 0.95em;
            opacity: 0.9;
        }

        .tips li::before {
            content: "💡";
            position: absolute;
            left: 0;
        }

        @media (max-width: 600px) {
            .offline-container {
                margin: 20px;
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1.1em;
            }

            .offline-icon {
                width: 100px;
                height: 100px;
            }

            .offline-icon svg {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24">
                <path d="M23,9C23,13.97 18.97,18 14,18C13.64,18 13.27,18 12.92,17.96C12.33,19.3 11.1,20.2 9.68,20.66C8.17,21.16 6.5,21.06 5.09,20.37L3.85,21.61C3.54,21.9 3.06,21.9 2.75,21.61C2.44,21.3 2.44,20.82 2.75,20.53L20.53,2.75C20.84,2.44 21.32,2.44 21.61,2.75C21.9,3.06 21.9,3.54 21.61,3.85L20.37,5.09C21.06,6.5 21.16,8.17 20.66,9.68C20.2,11.1 19.3,12.33 17.96,12.92C18,13.27 18,13.64 18,14C18,18.97 13.97,23 9,23C4.03,23 0,18.97 0,14C0,10.62 2.27,7.74 5.5,6.71L23,9M14,16C17.86,16 21,12.86 21,9C21,5.14 17.86,2 14,2C10.14,2 7,5.14 7,9C7,12.86 10.14,16 14,16Z"/>
            </svg>
        </div>
        
        <h1>您已离线</h1>
        <p class="subtitle">网络连接似乎出现了问题，但您仍然可以使用PSYCO的某些功能</p>

        <ul class="features">
            <li>查看已缓存的聊天记录</li>
            <li>使用离线心理测试工具</li>
            <li>阅读心理健康资源</li>
            <li>查看个人资料信息</li>
        </ul>

        <button class="retry-button" onclick="location.reload()">重新连接</button>
        <button class="retry-button" onclick="goHome()">返回首页</button>

        <div class="network-status">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">检查网络连接状态...</span>
        </div>

        <div class="tips">
            <h3>💡 离线使用小贴士</h3>
            <ul>
                <li>确保您的WiFi或移动数据已开启</li>
                <li>尝试切换到不同的网络</li>
                <li>检查是否有网络防火墙限制</li>
                <li>刷新页面或重启应用</li>
                <li>联系网络服务提供商</li>
            </ul>
        </div>
    </div>

    <script>
        // 网络状态监测
        function updateNetworkStatus() {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                indicator.className = 'status-indicator online';
                statusText.textContent = '网络已连接 - 点击重新连接按钮';
            } else {
                indicator.className = 'status-indicator';
                statusText.textContent = '网络已断开 - 请检查网络设置';
            }
        }

        // 返回首页
        function goHome() {
            if ('serviceWorker' in navigator) {
                // 尝试从缓存加载首页
                window.location.href = '/';
            } else {
                // 直接跳转
                window.location.href = '/';
            }
        }

        // 自动重连检测
        function startAutoReconnect() {
            setInterval(() => {
                if (navigator.onLine) {
                    // 尝试发送一个小的请求来检测真实的网络状态
                    fetch('/manifest.json', { 
                        method: 'GET',
                        cache: 'no-cache',
                        signal: AbortSignal.timeout(3000)
                    })
                    .then(response => {
                        if (response.ok) {
                            // 网络恢复，自动跳转
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 1000);
                        }
                    })
                    .catch(error => {
                        console.log('网络仍未完全恢复:', error);
                    });
                }
            }, 5000); // 每5秒检测一次
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateNetworkStatus();
            startAutoReconnect();

            // 监听网络状态变化
            window.addEventListener('online', updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (e.key === 'r' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    location.reload();
                }
                if (e.key === 'Escape') {
                    goHome();
                }
            });
        });

        console.log('📱 PSYCO 离线页面已加载');
        console.log('🔧 支持的快捷键: Ctrl/Cmd+R (重新加载), Esc (返回首页)');
    </script>
</body>
</html>
